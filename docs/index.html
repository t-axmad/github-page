<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
    <h1>Messages Board</h1>
    <table border="1" cellpadding="10">
        <thead>
            <tr>
                <th>User</th>
                <th>Message</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody id="messages-body">
            <tr>
                <td colspan="3">Loading...</td>
            </tr>
        </tbody>
    </table>

    <script>
        async function loadMessages() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/t-axmad/github-page/main/messages.json');
                if (!response.ok) throw new Error('Failed to load messages');
                const messages = await response.json();
                
                const tbody = document.getElementById('messages-body');
                tbody.innerHTML = '';
                
                if (messages.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3">No messages yet</td></tr>';
                    return;
                }
                
                messages.slice().reverse().forEach(msg => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${escapeHtml(msg.username)}</td>
                        <td>${escapeHtml(msg.message)}</td>
                        <td>${escapeHtml(msg.timestamp)}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                document.getElementById('messages-body').innerHTML = 
                    '<tr><td colspan="3">Error loading messages</td></tr>';
                console.error('Error:', error);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadMessages();
        setInterval(loadMessages, 60000);
    </script>
</body>
</html>
