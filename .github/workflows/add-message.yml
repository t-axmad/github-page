name: Add Signed Message

on:
  repository_dispatch:
    types: [add-message]

jobs:
  add-message:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install cryptography==41.0.7
    
    - name: Verify signature and add message
      env:
        MESSAGE: ${{ github.event.client_payload.message }}
        SIGNATURE: ${{ github.event.client_payload.signature }}
        USERNAME: ${{ github.event.client_payload.username }}
      run: |
        python -c "
        import json
        import base64
        from cryptography.hazmat.primitives import serialization, hashes
        from cryptography.hazmat.primitives.asymmetric import padding, utils
        from cryptography.exceptions import InvalidSignature
        import sys
        
        # Load public keys
        try:
            with open('public-keys.json', 'r') as f:
                public_keys = json.load(f)
        except FileNotFoundError:
            print('❌ public-keys.json not found')
            sys.exit(1)
        
        username = '$USERNAME'
        message = '$MESSAGE'
        signature_b64 = '$SIGNATURE'
        
        # Check if user has public key
        if username not in public_keys:
            print(f'❌ User {username} not found')
            sys.exit(1)
        
        # Load public key
        try:
            public_key_pem = public_keys[username].encode()
            public_key = serialization.load_pem_public_key(public_key_pem)
        except Exception as e:
            print(f'❌ Failed to load public key: {e}')
            sys.exit(1)
        
        # Verify signature
        try:
            signature = base64.b64decode(signature_b64)
            public_key.verify(
                signature,
                message.encode('utf-8'),
                padding.PSS(
                    mgf=padding.MGF1(hashes.SHA256()),
                    salt_length=padding.PSS.MAX_LENGTH
                ),
                hashes.SHA256()
            )
            print('✅ Signature verified!')
        except InvalidSignature:
            print('❌ Invalid signature!')
            sys.exit(1)
        except Exception as e:
            print(f'❌ Verification error: {e}')
            sys.exit(1)
        
        # Load existing messages
        try:
            with open('messages.json', 'r') as f:
                messages = json.load(f)
        except FileNotFoundError:
            messages = []
        
        # Add new message
        import datetime
        messages.append({
            'username': username,
            'message': message,
            'timestamp': datetime.datetime.now(datetime.timezone.utc).isoformat()
        })
        
        # Save messages
        with open('messages.json', 'w') as f:
            json.dump(messages, f, indent=2)
        
        print(f'✅ Message added from {username}')
        "
    
    - name: Commit and push
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add messages.json
        git diff --staged --quiet || git commit -m "Add message from ${{ github.event.client_payload.username }}"
        git push
