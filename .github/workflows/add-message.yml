name: Receive Encrypted Message

on:
  repository_dispatch:
    types: [new-encrypted-message]

jobs:
  decrypt-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssl jq

      - name: 🔓 Decrypt message
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}  # Ваш приватный ключ
        run: |
          # Получаем зашифрованное сообщение
          ENCRYPTED_B64="${{ github.event.client_payload.encrypted }}"
          
          # Декодируем из Base64
          echo "$ENCRYPTED_B64" | base64 -d > encrypted.bin
          
          # Сохраняем приватный ключ из секрета
          echo "$PRIVATE_KEY" > private_key.pem
          
          # Расшифровываем
          DECRYPTED=$(openssl pkeyutl -decrypt \
            -inkey private_key.pem \
            -in encrypted.bin \
            -pkeyopt rsa_padding_mode:oaep \
            -pkeyopt rsa_oaep_md:sha256 2>/dev/null)
          
          if [ $? -ne 0 ]; then
            echo "❌ Decryption failed!"
            exit 1
          fi
          
          echo "✅ Decrypted: $DECRYPTED"
          echo "DECRYPTED_MESSAGE=$DECRYPTED" >> $GITHUB_ENV

      - name: 💾 Save message
        run: |
          MESSAGE="${{ env.DECRYPTED_MESSAGE }}"
          TIMESTAMP=$(date -Iseconds)
          
          if [ ! -f messages.json ]; then
            echo '[]' > messages.json
          fi
          
          jq --arg m "$MESSAGE" \
             --arg t "$TIMESTAMP" \
             '. + [{"message": $m, "timestamp": $t}]' \
             messages.json > tmp.json
          
          mv tmp.json messages.json

      - name: 📤 Commit and push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add messages.json
          git commit -m "New encrypted message" || echo "No changes"
          git push
