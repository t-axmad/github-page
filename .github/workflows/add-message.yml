name: Add Message

on:
  repository_dispatch:
    types: [new-message]

jobs:
  add-message:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq openssl

      - name: 📝 Save message and signature
        run: |
          echo "${{ github.event.client_payload.message }}" > message.txt
          echo "${{ github.event.client_payload.signature }}" | base64 -d > signature.bin

      - name: 🔑 Verify signature
        id: verify
        run: |
          echo "🔑 Verifying signature..."
          
          # Получаем список имён с помощью jq
          # Сначала читаем весь YAML и преобразуем в JSON
          if [ -f ".keys/allowed_keys.yaml" ]; then
            echo "📄 Reading YAML file..."
            
            # Получаем список ключей
            NAMES=$(yq eval -o=json '. | keys' .keys/allowed_keys.yaml | jq -r '.[]')
            
            echo "👥 Users: $NAMES"
            
            for name in $NAMES; do
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🔑 Trying: $name"
              
              # Получаем ключ из YAML
              PUBLIC_KEY=$(yq eval ".\"$name\"" .keys/allowed_keys.yaml)
              
              if [ -z "$PUBLIC_KEY" ] || [ "$PUBLIC_KEY" == "null" ]; then
                echo "  ⚠️ Empty key, skipping"
                continue
              fi
              
              echo "$PUBLIC_KEY" > temp_public.pem
              
              # Проверяем ключ
              if ! openssl rsa -pubin -in temp_public.pem -text -noout 2>/dev/null; then
                echo "  ❌ Invalid key format"
                continue
              fi
              echo "  ✅ Key is valid"
              
              # Проверяем подпись
              if openssl dgst -sha256 -verify temp_public.pem -signature signature.bin message.txt 2>/dev/null; then
                echo "  ✅✅✅ VERIFIED! Sender: $name"
                echo "SENDER_NAME=$name" >> $GITHUB_ENV
                echo "MESSAGE_TEXT=$(cat message.txt)" >> $GITHUB_ENV
                exit 0
              else
                echo "  ❌ Signature mismatch"
              fi
            done
          fi
          
          echo "❌ No matching key found"
          exit 1

      - name: 💾 Add message
        run: |
          SENDER="${{ env.SENDER_NAME }}"
          MESSAGE="${{ env.MESSAGE_TEXT }}"
          TIMESTAMP=$(date -Iseconds)
          
          if [ ! -f messages.json ]; then
            echo '[]' > messages.json
          fi
          
          jq --arg s "$SENDER" \
             --arg m "$MESSAGE" \
             --arg t "$TIMESTAMP" \
             '. + [{"username": $s, "message": $m, "timestamp": $t}]' \
             messages.json > tmp.json
          
          mv tmp.json messages.json
          echo "✅ Message added!"

      - name: 📤 Commit and push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add messages.json
          git commit -m "Message from ${{ env.SENDER_NAME }}" || echo "No changes"
          git push
